<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Card -->
  <rect width="900" height="240" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- Left column: Systems -->
  <text x="28" y="34" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#00d9ff" letter-spacing="0.5">⚡  Systems &amp; Infrastructure</text>
  <line x1="28" y1="42" x2="430" y2="42" stroke="#21262d" stroke-width="0.5"/>

  <text x="28" y="66" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Distributed consensus</tspan><tspan fill="#8b949e"> (Raft, Paxos)</tspan></text>
  <text x="28" y="88" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Event-driven architectures</tspan></text>
  <text x="28" y="110" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> WebRTC &amp; P2P networking</tspan></text>
  <text x="28" y="132" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Real-time pub/sub systems</tspan></text>
  <text x="28" y="154" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Low-latency data pipelines</tspan></text>
  <text x="28" y="176" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">└──<tspan fill="#e6edf3"> Horizontal scalability patterns</tspan></text>

  <!-- Vertical divider -->
  <line x1="450" y1="16" x2="450" y2="224" stroke="#21262d" stroke-width="0.5"/>

  <!-- Right column: Scientific -->
  <text x="478" y="34" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#d2a8ff" letter-spacing="0.5">🔬  Scientific Computing</text>
  <line x1="478" y1="42" x2="872" y2="42" stroke="#21262d" stroke-width="0.5"/>

  <text x="478" y="66" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Computational physics simulations</tspan></text>
  <text x="478" y="88" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Numerical methods &amp; solvers</tspan></text>
  <text x="478" y="110" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> HPC &amp; parallel computation</tspan></text>
  <text x="478" y="132" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Scientific software engineering</tspan></text>
  <text x="478" y="154" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">├──<tspan fill="#e6edf3"> Data-intensive workflows</tspan></text>
  <text x="478" y="176" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">└──<tspan fill="#e6edf3"> Physics-informed algorithms</tspan></text>

  <!-- Bottom note -->
  <line x1="28" y1="200" x2="872" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <text x="450" y="220" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">Both domains share the same underlying mathematics — that's what makes them interesting together.</text>
