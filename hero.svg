<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#00d9ff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect width="900" height="200" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- subtle dot grid -->
  <g fill="#21262d" opacity="0.5">
    <circle cx="90" cy="40" r="1"/><circle cx="180" cy="40" r="1"/><circle cx="270" cy="40" r="1"/>
    <circle cx="360" cy="40" r="1"/><circle cx="450" cy="40" r="1"/><circle cx="540" cy="40" r="1"/>
    <circle cx="630" cy="40" r="1"/><circle cx="720" cy="40" r="1"/><circle cx="810" cy="40" r="1"/>
    <circle cx="90" cy="160" r="1"/><circle cx="180" cy="160" r="1"/><circle cx="270" cy="160" r="1"/>
    <circle cx="360" cy="160" r="1"/><circle cx="450" cy="160" r="1"/><circle cx="540" cy="160" r="1"/>
    <circle cx="630" cy="160" r="1"/><circle cx="720" cy="160" r="1"/><circle cx="810" cy="160" r="1"/>
  </g>

  <!-- top + bottom gradient border lines -->
  <line x1="100" y1="1" x2="800" y2="1" stroke="url(#borderGrad)" stroke-width="1.5"/>
  <line x1="100" y1="199" x2="800" y2="199" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- corner brackets -->
  <polyline points="20,40 20,20 40,20" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="860,40 860,20 840,20" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polyline points="20,160 20,180 40,180" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polyline points="860,160 860,180 840,180" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>

  <!-- ⚛ atom symbol -->
  <text x="450" y="66" font-family="'JetBrains Mono','Courier New',monospace" font-size="18" fill="#00d9ff" text-anchor="middle" opacity="0.6">⚛</text>

  <!-- Main name -->
  <text x="450" y="112" font-family="'JetBrains Mono','Courier New',monospace" font-size="28" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="4">H.M. TAJUL ISLAM TANIM</text>

  <!-- Subtitle -->
  <text x="450" y="138" font-family="'JetBrains Mono','Courier New',monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2.5">Physics Undergraduate  ·  Scientific Computing  ·  Systems Engineering</text>

  <!-- bottom tagline -->
  <text x="450" y="164" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e" text-anchor="middle" opacity="0.6">Building software at the intersection of science, systems, and scalable infrastructure.</text>
</svg>
