<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect width="900" height="200" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
  </g>

  <!-- Glow dot top-left -->
  <circle cx="60" cy="100" r="40" fill="#00d9ff" opacity="0.04"/>
  <circle cx="840" cy="100" r="40" fill="#a78bfa" opacity="0.04"/>

  <!-- ASCII box lines -->
  <text x="450" y="30" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#21262d" text-anchor="middle">╔══════════════════════════════════════════════════════════╗</text>
  <text x="450" y="170" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#21262d" text-anchor="middle">╚══════════════════════════════════════════════════════════╝</text>

  <!-- Side bars -->
  <text x="96" y="100" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#21262d" text-anchor="middle">║</text>
  <text x="804" y="100" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#21262d" text-anchor="middle">║</text>

  <!-- ⚛ icon -->
  <text x="450" y="68" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00d9ff" text-anchor="middle" opacity="0.7">⚛</text>

  <!-- Main name -->
  <text x="450" y="108" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="26" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="3">H.M. TAJUL ISLAM TANIM</text>

  <!-- Subtitle line 1 -->
  <text x="450" y="136" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">Physics Undergraduate  ·  Scientific Computing</text>

  <!-- Subtitle line 2 -->
  <text x="450" y="155" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">Systems &amp; Real-Time Engineering</text>
</svg>
