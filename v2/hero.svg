<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00d9ff" stop-opacity="0.6"/>
      <stop offset="75%"  stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="180" fill="#0d1117"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="900" height="1" fill="url(#lineGrad)"/>

  <!-- corner brackets — subtle -->
  <polyline points="24,48 24,24 48,24"   fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.35"/>
  <polyline points="876,48 876,24 852,24" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
  <polyline points="24,132 24,156 48,156" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
  <polyline points="876,132 876,156 852,156" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.35"/>

  <!-- name -->
  <text x="450" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="30" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="3">H.M. TAJUL ISLAM TANIM</text>

  <!-- subtitle -->
  <text x="450" y="122" font-family="'JetBrains Mono','Courier New',monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">Physics Undergraduate  ·  Scientific Computing  ·  Systems Engineering</text>

  <!-- bottom line -->
  <rect x="0" y="179" width="900" height="1" fill="url(#lineGrad)"/>
</svg>
