  <text x="26" y="134" font-family="'JetBrains Mono','Courier New',monospace" font-size="12"><tspan fill="#d2a8ff">FUN_FACTS[2]</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#a5d6ff">"Linux enthusiast — yes, I've tried Arch. Twice."</tspan></text>
  <text x="26" y="156" font-family="'JetBrains Mono','Courier New',monospace" font-size="12"><tspan fill="#d2a8ff">FUN_FACTS[3]</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#a5d6ff">"Julia + Python are my scientific computing power couple"</tspan></text>
  <text x="26" y="178" font-family="'JetBrains Mono','Courier New',monospace" font-size="12"><tspan fill="#d2a8ff">FUN_FACTS[4]</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#a5d6ff">"I think in graphs, queues, and state machines"</tspan></text>
  <text x="26" y="200" font-family="'JetBrains Mono','Courier New',monospace" font-size="12"><tspan fill="#d2a8ff">FUN_FACTS[5]</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#a5d6ff">"Physics and distributed systems share the same math — coincidence?"</tspan></text>

