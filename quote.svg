<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="900" height="140" rx="12" fill="url(#bgG)"/>
  <rect width="900" height="140" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Top accent line -->
  <rect x="350" y="0" width="200" height="2" rx="1" fill="url(#borderGrad)"/>

  <!-- Big quote marks -->
  <text x="42" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#00d9ff" opacity="0.15">"</text>

  <!-- Quote text line 1 -->
  <text x="450" y="54" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9" text-anchor="middle">The best way to understand a system is to build one.</text>
  <!-- Quote text line 2 -->
  <text x="450" y="76" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9" text-anchor="middle">The best way to build one is to understand the physics.</text>

  <!-- Attribution -->
  <text x="450" y="104" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">— H.M. Tajul Islam Tanim  ·  Bangladesh 🇧🇩  ·  Physics × Engineering</text>

  <!-- Bottom accent line -->
  <rect x="350" y="138" width="200" height="2" rx="1" fill="url(#borderGrad)"/>
</svg>
