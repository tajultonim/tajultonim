  <text x="313" y="143" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle">Express + Socket.IO</text>
  <text x="313" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle">TypeScript</text>

