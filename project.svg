      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b4048" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="300" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- Header bar -->
