  <rect x="640" y="148" width="90" height="22" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="685" y="163" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#cdd9e5" text-anchor="middle">Socket.IO</text>

  <rect x="640" y="178" width="90" height="22" rx="4" fill="rgba(49,120,198,0.1)" stroke="rgba(49,120,198,0.35)" stroke-width="1"/>
  <text x="685" y="193" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">TypeScript</text>

  <rect x="640" y="208" width="90" height="22" rx="4" fill="rgba(0,120,212,0.1)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>
  <text x="685" y="223" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#4da6ff" text-anchor="middle">Azure</text>

  <rect x="640" y="238" width="90" height="22" rx="4" fill="rgba(247,100,50,0.08)" stroke="rgba(247,100,50,0.3)" stroke-width="1"/>
  <text x="685" y="253" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#f78166" text-anchor="middle">SQL</text>

  <!-- Features list -->
  <text x="760" y="110" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#8b949e" letter-spacing="2">FEATURES</text>
  <text x="760" y="132" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> Real-time messaging</tspan></text>
  <text x="760" y="152" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> Moderation system</tspan></text>
  <text x="760" y="172" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> Report pipeline</tspan></text>
  <text x="760" y="192" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> Anonymous identity</tspan></text>
  <text x="760" y="212" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> Azure hosted</tspan></text>
  <text x="760" y="232" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6edf3"> SQL persistence</tspan></text>

  <!-- Bottom divider + link hint -->
  <line x1="26" y1="268" x2="874" y2="268" stroke="#21262d" stroke-width="0.5"/>
  <text x="26" y="286" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#8b949e">github.com/tajultonim  ·  click the badge below to view repository</text>
