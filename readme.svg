            .card2 { fill: #0d1117; stroke: #21262d; stroke-width: 1.5; }
            .title { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
            .section { font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform:
            uppercase; fill: #00d9ff; }
            .label { font-size: 18px; font-weight: 700; fill: #ff7b72; }
            .value { font-size: 18px; fill: #a5d6ff; }
            .small { font-size: 14px; }
            .tiny { font-size: 12px; }
            .chip { font-size: 14px; font-weight: 700; }
        </style>
