<svg viewBox="0 0 1400 900" width="100%" xmlns="http://www.w3.org/2000/svg">

    <style>

        @keyframes stars{
        0%{transform:translateY(0)}
        100%{transform:translateY(-200px)}
        }

        @keyframes pulse{
        0%{opacity:.4}
        50%{opacity:1}
        100%{opacity:.4}
        }

        @keyframes grow{
        from{width:0}
        }

        @keyframes float{
        0%{transform:translateY(0)}
        50%{transform:translateY(-4px)}
        100%{transform:translateY(0)}
        }

        .title{
        font:bold 52px monospace;
        fill:#58a6ff;
        }

        .subtitle{
        font:18px monospace;
        fill:#c9d1d9;
        }

        .panel{
        fill:#161b22;
        stroke:#30363d;
        stroke-width:2;
        rx:14;
        }

        .panel:hover{
        stroke:#58a6ff;
        }

        .label{
        font:18px monospace;
        fill:#58a6ff;
        }

        .text{
        font:15px monospace;
        fill:#c9d1d9;
        }

        .terminal{
        font:14px monospace;
        fill:#7ee787;
        }

        .button{
        fill:#21262d;
        stroke:#30363d;
        rx:10;
        transition:.3s;
        }

        .button:hover{
        fill:#30363d;
        transform:scale(1.05);
        }

        .skillbg{
        fill:#0d1117;
        stroke:#30363d;
        }

        .skillbar{
        fill:#58a6ff;
        animation:grow 2s ease;
        }

        .indicator{
        fill:#7ee787;
        animation:pulse 2s infinite;
        }

        .star{
        fill:white;
        opacity:.6;
        animation:stars 30s linear infinite;
        }

    </style>

    <rect width="100%" height="100%" fill="#0d1117" />

    <!-- stars -->

    <g class="star">
        <circle cx="200" cy="100" r="1" />
        <circle cx="500" cy="200" r="1" />
        <circle cx="800" cy="50" r="1" />
        <circle cx="1200" cy="150" r="1" />
        <circle cx="1000" cy="300" r="1" />
        <circle cx="300" cy="350" r="1" />
        <circle cx="700" cy="420" r="1" />
        <circle cx="1100" cy="500" r="1" />
        <circle cx="400" cy="600" r="1" />
        <circle cx="900" cy="700" r="1" />
    </g>

    <!-- HEADER -->

    <text x="50%" y="80" text-anchor="middle" class="title">
        H.M. Tajul Islam Tanim
    </text>

    <text x="50%" y="110" text-anchor="middle" class="subtitle">
        Physics • Scientific Computing • Machine Learning • Systems
    </text>

    <!-- TERMINAL PANEL -->

    <rect x="80" y="160" width="520" height="240" class="panel" />

    <circle cx="110" cy="180" r="6" fill="#ff5f56" />
    <circle cx="130" cy="180" r="6" fill="#ffbd2e" />
    <circle cx="150" cy="180" r="6" fill="#27c93f" />

    <text x="100" y="210" class="terminal">$ whoami</text>
    <text x="100" y="230" class="text">physics graduate → engineer</text>

    <text x="100" y="260" class="terminal">$ interests</text>
    <text x="100" y="280" class="text">computational physics</text>
    <text x="100" y="300" class="text">machine learning</text>
    <text x="100" y="320" class="text">distributed systems</text>
    <text x="100" y="340" class="text">scientific computing</text>

    <text x="100" y="370" class="terminal">$ status</text>
    <circle cx="190" cy="365" r="5" class="indicator" />
    <text x="210" y="370" class="text">building things</text>

    <!-- SKILLS PANEL -->

    <rect x="700" y="160" width="600" height="240" class="panel" />

    <text x="720" y="200" class="label">SKILLS</text>

    <rect x="720" y="230" width="520" height="12" class="skillbg" />
    <rect x="720" y="230" width="420" height="12" class="skillbar" />
    <text x="720" y="225" class="text">Python</text>

    <rect x="720" y="270" width="520" height="12" class="skillbg" />
    <rect x="720" y="270" width="360" height="12" class="skillbar" />
    <text x="720" y="265" class="text">JavaScript / TypeScript</text>

    <rect x="720" y="310" width="520" height="12" class="skillbg" />
    <rect x="720" y="310" width="300" height="12" class="skillbar" />
    <text x="720" y="305" class="text">C / C++</text>

    <rect x="720" y="350" width="520" height="12" class="skillbg" />
    <rect x="720" y="350" width="380" height="12" class="skillbar" />
    <text x="720" y="345" class="text">Linux / Systems</text>

    <!-- PROJECT PANEL -->

    <rect x="80" y="440" width="600" height="240" class="panel" />

    <text x="100" y="480" class="label">PROJECTS</text>

    <text x="100" y="510" class="text">SneakyChat — real-time chat platform</text>
    <text x="100" y="540" class="text">Telegram bots — automation tools</text>
    <text x="100" y="570" class="text">AI experiments — ML research</text>
    <text x="100" y="600" class="text">Scientific computing tools</text>

    <!-- RESEARCH PANEL -->

    <rect x="720" y="440" width="580" height="240" class="panel" />

    <text x="740" y="480" class="label">RESEARCH INTERESTS</text>

    <text x="740" y="510" class="text">computational physics</text>
    <text x="740" y="540" class="text">machine learning</text>
    <text x="740" y="570" class="text">numerical simulation</text>
    <text x="740" y="600" class="text">high performance computing</text>

    <!-- NAVIGATION -->

    <a href="https://github.com/tajultonim">
        <rect x="380" y="750" width="180" height="60" class="button" />
        <text x="470" y="785" text-anchor="middle" class="text">GitHub</text>
    </a>

    <a href="https://github.com/tajultonim?tab=repositories">
        <rect x="620" y="750" width="180" height="60" class="button" />
        <text x="710" y="785" text-anchor="middle" class="text">Repositories</text>
    </a>

    <a href="https://instagram.com">
        <rect x="860" y="750" width="180" height="60" class="button" />
        <text x="950" y="785" text-anchor="middle" class="text">Mewmentum</text>
    </a>

</svg>