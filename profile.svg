    </text>

    <!-- Tech Stack -->
    <rect x="480" y="150" width="320" height="200" class="box" />

    <text x="500" y="190" class="label">Tech Stack</text>

    <text x="500" y="220" class="tech">
        Python • C/C++
    </text>

    <text x="500" y="240" class="tech">
        JavaScript • TypeScript
    </text>

    <text x="500" y="260" class="tech">
        Node • Svelte • Tailwind
    </text>

    <text x="500" y="280" class="tech">
        Linux • Docker • Git
    </text>

    <text x="500" y="300" class="tech">
        NumPy • SciPy • PyTorch
    </text>

    <!-- Interactive Links -->

    <a href="https://github.com/tajultonim">
        <rect x="180" y="380" width="150" height="50" class="linkbox" />
        <text x="255" y="410" text-anchor="middle" class="tech">
            GitHub
        </text>
    </a>

    <a href="https://instagram.com">
        <rect x="380" y="380" width="150" height="50" class="linkbox" />
        <text x="455" y="410" text-anchor="middle" class="tech">
