<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

    <style>
        .title {
        font: bold 40px monospace;
        fill: #58a6ff;
        }

        .subtitle {
        font: 18px monospace;
        fill: #c9d1d9;
        }

        .box {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 2;
        rx: 12;
        }

        .linkbox {
        fill: #21262d;
        stroke: #30363d;
        rx: 10;
        transition: all .3s;
        }

        .linkbox:hover {
        fill: #30363d;
        transform: scale(1.05);
        }

        .label {
        font: 16px monospace;
        fill: #58a6ff;
        }

        .tech {
        font: 14px monospace;
        fill: #c9d1d9;
        }
    </style>

    <rect width="100%" height="100%" fill="#0d1117" />

    <!-- Title -->
    <text x="50%" y="80" text-anchor="middle" class="title">
        H.M. Tajul Islam Tanim
    </text>

    <text x="50%" y="110" text-anchor="middle" class="subtitle">
        Physics • Scientific Computing • Machine Learning • Systems
    </text>

    <!-- About Box -->
    <rect x="80" y="150" width="320" height="200" class="box" />

    <text x="100" y="190" class="label">About</text>

    <text x="100" y="220" class="tech">
        Physics graduate exploring
    </text>

    <text x="100" y="240" class="tech">
        computational science,
    </text>

    <text x="100" y="260" class="tech">
        machine learning,
    </text>

    <text x="100" y="280" class="tech">
        and backend systems.
    </text>

    <text x="100" y="320" class="tech">
