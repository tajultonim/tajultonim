<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">


    <style>
        @import
        url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--cyan:#00d9ff;--purple:#6e40c9;--dark:#0d1117;--card:#161b22;--border:#21262d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--orange:#f78166}
        body{background:var(--dark);color:var(--text);font-family:'JetBrains
        Mono',monospace;padding:0;overflow-x:hidden}
        .readme{max-width:680px;margin:0 auto;padding:20px 16px 32px}
        .hero{text-align:center;padding:32px 0 24px;position:relative}
        .hero-ascii{font-size:9px;line-height:1.3;color:var(--cyan);letter-spacing:0.05em;white-space:pre;display:inline-block;animation:fadeIn
        0.8s ease}
        .hero-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:14px
        0 6px;letter-spacing:-0.5px}
        .hero-sub{font-size:11px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px}
        .hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
        .badge{display:inline-flex;align-items:center;gap:5px;padding:4px
        10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.04em;border:1px
        solid}
        .badge-cyan{background:rgba(0,217,255,0.08);border-color:rgba(0,217,255,0.3);color:var(--cyan)}
        .badge-purple{background:rgba(110,64,201,0.12);border-color:rgba(110,64,201,0.4);color:#a78bfa}
        .badge-green{background:rgba(63,185,80,0.08);border-color:rgba(63,185,80,0.3);color:var(--green)}
        .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px
        0}
        .section-label{font-size:10px;color:var(--cyan);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
        .terminal-block{background:var(--card);border:1px solid
        var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
        .terminal-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px
        solid var(--border);background:#0d1117}
        .dot{width:10px;height:10px;border-radius:50%}
        .dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
        .terminal-filename{font-size:10px;color:var(--muted);margin-left:auto}
        .terminal-body{padding:14px 16px;font-size:11px;line-height:1.8}
        .k{color:#ff7b72}.v{color:#79c0ff}.s{color:#a5d6ff}.c{color:var(--muted);font-style:italic}.g{color:var(--green)}.cy{color:var(--cyan)}.pu{color:#d2a8ff}
        .tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
        .tech-card{background:var(--card);border:1px solid
        var(--border);border-radius:10px;padding:14px}
        .tech-card-title{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
        .pill-row{display:flex;flex-wrap:wrap;gap:5px}
        .pill{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid
        rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#cdd9e5}
        .pill-js{border-color:rgba(247,223,30,0.3);color:#f7df1e;background:rgba(247,223,30,0.06)}
        .pill-ts{border-color:rgba(49,130,206,0.4);color:#60a5fa;background:rgba(49,130,206,0.08)}
        .pill-py{border-color:rgba(55,163,221,0.4);color:#57b6e6;background:rgba(55,163,221,0.08)}
        .pill-cpp{border-color:rgba(0,90,199,0.4);color:#7aa2f7;background:rgba(0,90,199,0.08)}
        .pill-julia{border-color:rgba(155,89,182,0.4);color:#c084fc;background:rgba(155,89,182,0.08)}
        .pill-node{border-color:rgba(63,185,80,0.4);color:var(--green);background:rgba(63,185,80,0.08)}
        .pill-socket{border-color:rgba(255,255,255,0.15);color:#cdd9e5;background:rgba(255,255,255,0.05)}
        .pill-next{border-color:rgba(255,255,255,0.12);color:#e2e8f0;background:rgba(255,255,255,0.04)}
        .project-card{background:var(--card);border:1px solid
        var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
        .project-header{padding:14px 16px 10px;border-bottom:1px solid
        var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
        .project-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--cyan)}
        .project-tag{font-size:9px;padding:2px
        7px;border-radius:20px;background:rgba(0,217,255,0.08);border:1px solid
        rgba(0,217,255,0.25);color:var(--cyan);white-space:nowrap}
        .project-desc{font-size:11px;color:var(--muted);margin:2px 0 0;line-height:1.5}
        .project-body{padding:12px 16px}
        .arch-box{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px
        12px;font-size:10px;color:var(--muted);line-height:1.7;margin-bottom:10px;font-family:'JetBrains
        Mono',monospace}
        .arch-box .cy{color:var(--cyan)}.arch-box .pu{color:#d2a8ff}.arch-box .g{color:var(--green)}
        .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .progress-label{font-size:10px;color:var(--text);width:220px;flex-shrink:0}
        .progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
        .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--purple))}
        .progress-pct{font-size:10px;color:var(--muted);width:30px;text-align:right}
        .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
        .stat-card{background:var(--card);border:1px solid
        var(--border);border-radius:10px;padding:12px;text-align:center}
        .stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stat-label{font-size:10px;color:var(--muted);margin-top:2px}
        .goals-list{list-style:none;display:flex;flex-direction:column;gap:6px}
        .goals-list
        li{font-size:11px;color:var(--muted);padding-left:16px;position:relative;line-height:1.5}
        .goals-list li::before{content:'▸';position:absolute;left:0;color:var(--cyan)}
        .goals-list li span{color:var(--text)}
        .connect-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
        .connect-btn{display:inline-flex;align-items:center;gap:6px;padding:7px
        14px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;border:1px solid
        var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all 0.15s}
        .connect-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,217,255,0.05)}
        .icon{font-size:14px}

        .footer{text-align:center;padding:20px 0
        8px;font-size:10px;color:var(--muted);letter-spacing:0.05em}

        @keyframes
        fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        .cursor{display:inline-block;width:8px;height:13px;background:var(--cyan);animation:blink 1s
        infinite;vertical-align:middle;margin-left:2px}
    </style>

    <div class="readme">

        <div class="hero">
            <div class="hero-ascii">╔══════════════════════════════════════╗
                ║ H.M. TAJUL ISLAM TANIM ⚛ ║
                ╚══════════════════════════════════════╝</div>
            <div class="hero-name">Physics × Engineering × Systems</div>
            <div class="hero-sub">Scientific Computing · Distributed Systems · Real-Time Infra</div>
            <div class="hero-badges">
                <span class="badge badge-cyan">📍 Bangladesh</span>
                <span class="badge badge-purple">⚛ Physics Undergrad</span>
                <span class="badge badge-green">🟢 Open to Collaborate</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">whoami</div>
        <div class="terminal-block">
            <div class="terminal-bar">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="terminal-filename">profile.yml</span>
            </div>
            <div class="terminal-body">
                <div>
                    <span class="k">name</span>
                    <span class="v">:</span>
                    <span class="s">H.M. Tajul Islam Tanim</span>
                </div>
                <div>
                    <span class="k">alias</span>
                    <span class="v">:</span>
                    <span class="s">tajultonim</span>
                </div>
                <div>
                    <span class="k">role</span>
                    <span class="v">:</span>
                    <span class="s">Physics Undergrad → Systems Engineer</span>
                </div>
                <div>
                    <span class="k">location</span>
                    <span class="v">:</span>
                    <span class="s">Dhaka, Bangladesh 🇧🇩</span>
                </div>
                <div>
                    <span class="k">focus</span>
                    <span class="v">:</span>
                </div>
                <div>&nbsp;&nbsp;<span class="v">-</span> <span class="g">Scientific Computing</span></div>
                <div>&nbsp;&nbsp;<span class="v">-</span> <span class="cy">Distributed Systems</span></div>
                <div>&nbsp;&nbsp;<span class="v">-</span> <span class="pu">Real-Time Engineering</span></div>
                <div>&nbsp;&nbsp;<span class="v">-</span> <span class="g">High Performance Computing</span></div>
                <div>
                    <span class="k">status</span>
                    <span class="v">:</span>
                    <span class="s">Building systems that move data fast</span>
                </div>
                <div>
                    <span class="k">mindset</span>
                    <span class="v">:</span>
                    <span class="s">Physics shapes thinking. Engineering shapes what I build.</span>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">tech stack</div>
        <div class="tech-grid">
            <div class="tech-card">
                <div class="tech-card-title">Languages</div>
                <div class="pill-row">
                    <span class="pill pill-js">JavaScript</span>
                    <span class="pill pill-ts">TypeScript</span>
                    <span class="pill pill-py">Python</span>
                    <span class="pill pill-cpp">C++</span>
                    <span class="pill pill-julia">Julia</span>
                </div>
            </div>
            <div class="tech-card">
                <div class="tech-card-title">Frameworks</div>
                <div class="pill-row">
                    <span class="pill pill-node">Node.js</span>
                    <span class="pill pill-socket">Socket.IO</span>
                    <span class="pill pill-next">Next.js</span>
                    <span class="pill pill-julia">Svelte</span>
                    <span class="pill pill-ts">Tailwind</span>
                </div>
            </div>
            <div class="tech-card">
                <div class="tech-card-title">Tools & Infra</div>
                <div class="pill-row">
                    <span class="pill pill-node">Linux</span>
                    <span class="pill pill-socket">Git</span>
                    <span class="pill pill-cpp">Azure</span>
                    <span class="pill pill-ts">VSCode</span>
                    <span class="pill pill-julia">Jupyter</span>
                </div>
            </div>
            <div class="tech-card">
                <div class="tech-card-title">Domains</div>
                <div class="pill-row">
                    <span class="pill pill-cy"
                        style="border-color:rgba(0,217,255,0.3);color:var(--cyan);background:rgba(0,217,255,0.06)">
                        WebRTC</span>
                    <span class="pill pill-socket">P2P</span>
                    <span class="pill pill-py">HPC</span>
                    <span class="pill pill-julia">CompSci</span>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">featured project</div>
        <div class="project-card">
            <div class="project-header">
                <div>
                    <div class="project-name">💬 SneakyChat</div>
                    <div class="project-desc">Real-time anonymous chat with moderation &amp;
                        reporting infrastructure</div>
                </div>
                <span class="project-tag">LIVE</span>
            </div>
            <div class="project-body">
                <div class="arch-box">
                    <span class="cy">Client</span> ──WebSocket──► <span class="pu">Node.js Server</span>
                    ──► <span class="g">SQL Database</span> │ │ └──── <span class="cy">Socket.IO</span>
                    ─────┘ │ <span class="g">Azure Cloud Host</span></div>
                <div class="pill-row">
                    <span class="pill pill-node">Node.js</span>
                    <span class="pill pill-socket">Socket.IO</span>
                    <span class="pill pill-ts">TypeScript</span>
                    <span class="pill pill-cpp">Azure</span>
                    <span class="pill"
                        style="border-color:rgba(247,100,50,0.3);color:#f78166;background:rgba(247,100,50,0.06)">
                        SQL</span>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">currently building</div>
        <div class="terminal-block">
            <div class="terminal-bar">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="terminal-filename">htop</span>
            </div>
            <div class="terminal-body">
                <div class="progress-row">
                    <span class="progress-label"><span class="cy">[1]</span> Real-time chat
                        infrastructure</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:85%"></div>
                    </div>
                    <span class="progress-pct">85%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-label"><span class="cy">[2]</span> WebRTC P2P image
                        transfer</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:60%"></div>
                    </div>
                    <span class="progress-pct">60%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-label"><span class="cy">[3]</span> Distributed Node.js
                        experiments</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:40%"></div>
                    </div>
                    <span class="progress-pct">40%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-label"><span class="cy">[4]</span> Scalable backend
                        architecture</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:70%"></div>
                    </div>
                    <span class="progress-pct">70%</span>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">long-term goals</div>
        <div class="terminal-block">
            <div class="terminal-bar">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="terminal-filename">roadmap.yml</span>
            </div>
            <div class="terminal-body">
                <ul class="goals-list">
                    <li>
                        <span>Graduate research in scientific computing</span>
                    </li>
                    <li>
                        <span>Work on high-performance, low-latency systems</span>
                    </li>
                    <li>
                        <span>Build large-scale distributed infrastructure</span>
                    </li>
                    <li>
                        <span>Apply computation to real scientific problems</span>
                    </li>
                    <li>
                        <span>Bridge physics and computing at research scale</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-label">connect</div>
        <div class="connect-row">
            <a class="connect-btn" href="https://github.com/tajultonim"><span class="icon">⌥</span>
                GitHub</a>
            <a class="connect-btn" href="https://instagram.com/tajultonim"><span class="icon">◈</span>
                Instagram</a>
            <a class="connect-btn" href="https://facebook.com/tajultonim"><span class="icon">◉</span>
                Facebook</a>
        </div>

        <div class="footer"> ⭐ From H.M. Tajul Islam Tanim · Bangladesh 🇧🇩 · Physics × Engineering<div
                class="cursor"></div>
        </div>
    </div>


</svg>