        stroke:#30363d;
        rx:14;
        }

        .skillbg{
        fill:#0d1117;
        stroke:#30363d;
        }

        .skillbar{
        fill:#58a6ff;
        }

    </style>

    <rect width="100%" height="100%" fill="#0d1117" />

    <!-- HEADER -->

