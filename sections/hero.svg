<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="350" viewBox="0 0 1200 350" role="img"
    aria-labelledby="title desc">
    <title id="title">Hero Section</title>
    <desc id="desc">Hero section for the readme.</desc>

    <defs>
        <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d9ff" />
            <stop offset="100%" stop-color="#a78bfa" />
        </linearGradient>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d1117" />
            <stop offset="100%" stop-color="#161b22" />
        </linearGradient>
        <style>
            .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
            .text { fill: #e6edf3; }
            .muted { fill: #8b949e; }
            .cyan { fill: #00d9ff; }
            .purple { fill: #a78bfa; }
            .green { fill: #3fb950; }
        </style>
    </defs>
    <!-- ⚛ atom symbol -->
    <text x="50%" y="100" font-family="'JetBrains Mono','Courier New',monospace" font-size="70"
        fill="#00d9ff" text-anchor="middle" opacity="0.8">⚛</text>

    <!-- bottom tagline -->
    <text x="50%" y="180" font-family="'JetBrains Mono','Courier New',monospace" font-size="70"
        font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="4">H.M. TAJUL
        ISLAM TANIM</text>

    <text x="50%" y="230" font-family="'JetBrains Mono','Courier New',monospace" font-size="20"
        fill="#8b949e" text-anchor="middle" letter-spacing="2.5">Scientific
        Computing · Distributed Systems · Real-Time Infra</text>

    <text x="50%" y="265" font-family="'JetBrains Mono','Courier New',monospace" font-size="20"
        fill="#8b949e" text-anchor="middle" opacity="0.6">Building software at the intersection of
        science, systems, and scalable infrastructure.</text>

    <g transform="translate(230 300)">
        <rect x="0" y="0" rx="22" ry="22" width="220" height="44" fill="#00d9ff14"
            stroke="#00d9ff4d" />
        <text x="110" y="28" text-anchor="middle" class="mono small cyan">📍 Bangladesh</text>
    </g>
    <g transform="translate(490 300)">
        <rect x="0" y="0" rx="22" ry="22" width="220" height="44" fill="#6e40c91f"
            stroke="#6e40c966"
            opacity="0.95" />
        <text x="110" y="28" text-anchor="middle" class="mono small purple" fill="#ffffff">⚛ Physics
            Undergrad</text>
    </g>
    <g transform="translate(750 300)">
        <rect x="0" y="0" rx="22" ry="22" width="220" height="44" fill="#3fb95014"
            stroke="#3fb9504d"
            opacity="0.95" />
        <text x="110" y="28" text-anchor="middle" class="mono small green">🟢 Open to Collaborate</text>
    </g>
</svg>