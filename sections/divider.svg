<svg xmlns="http://www.w3.org/2000/svg" width="900" height="5" viewBox="0 0 900 5"
    preserveAspectRatio="none" role="separator" aria-label="divider">
    <defs>
        <linearGradient id="divider-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#21262d" stop-opacity="0" />
            <stop offset="50%" stop-color="#21262d" stop-opacity="1" />
            <stop offset="100%" stop-color="#21262d" stop-opacity="0" />
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="900" height="5" fill="url(#divider-gradient)" />
</svg>