<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Hero Section</title>
  <desc id="desc">Profile hero with name, tagline, and status badges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
      .text { fill: #e6edf3; }
      .muted { fill: #8b949e; }
      .cyan { fill: #00d9ff; }
      .purple { fill: #a78bfa; }
      .green { fill: #3fb950; }
    </style>
  </defs>


    <defs>
        <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d9ff" />
            <stop offset="100%" stop-color="#a78bfa" />
        </linearGradient>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d1117" />
            <stop offset="100%" stop-color="#161b22" />
        </linearGradient>
        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.0" />
            <stop offset="30%" stop-color="#00d9ff" stop-opacity="0.6" />
            <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.0" />
        </linearGradient>
    </defs>

    <!-- ⚛ atom symbol -->
    <text  font-family="'JetBrains Mono','Courier New',monospace" font-size="70"
        fill="#00d9ff" text-anchor="middle" opacity="0.8">⚛</text>

    <!-- bottom tagline -->
    <text x="600" y="250" font-family="'JetBrains Mono','Courier New',monospace" font-size="40"
        font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="4">H.M. TAJUL
        ISLAM TANIM</text>

    <text x="600" y="284" font-family="'JetBrains Mono','Courier New',monospace" font-size="12"
        fill="#8b949e" text-anchor="middle" letter-spacing="2.5">Scientific
        Computing · Distributed Systems · Real-Time Infra</text>

    <text x="600" y="318" font-family="'JetBrains Mono','Courier New',monospace" font-size="11"
        fill="#8b949e" text-anchor="middle" opacity="0.6">Building software at the intersection of
        science, systems, and scalable infrastructure.</text>

    <g transform="translate(200 340)">
        <rect x="0" y="0" rx="44" ry="22" width="180" height="44" fill="#0d1117" stroke="#21262d" />
        <text x="90" y="28" text-anchor="middle" class="mono small text">Bangladesh</text>
    </g>
    <g transform="translate(510 340)">
        <rect x="0" y="0" rx="22" ry="22" width="180" height="44" fill="#141126" stroke="#6e40c9"
            opacity="0.95" />
        <text x="90" y="28" text-anchor="middle" class="mono small purple">Physics Undergrad</text>
    </g>
    <g transform="translate(820 340)">
        <rect x="0" y="0" rx="22" ry="22" width="220" height="44" fill="#102014" stroke="#3fb950"
            opacity="0.95" />
        <text x="110" y="28" text-anchor="middle" class="mono small green">Open to Collaborate</text>
    </g>

    <line x1="120" y1="408" x2="1080" y2="408" stroke="#21262d" stroke-width="1.5" />
</svg>
